<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USC Comptroller — Admin Ledger</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #1e3a5f;
    font-family: Arial, sans-serif;
  }
  #loader {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #fff;
    z-index: 2;
    transition: opacity 0.3s ease;
  }
  #loader .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid rgba(255,255,255,0.25);
    border-top-color: #f0c040;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 14px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #app-frame {
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border: none;
    z-index: 1;
  }
</style>
</head>
<body>

  <div id="loader">
    <div class="spinner"></div>
    <div>Loading…</div>
  </div>

  <iframe
    id="app-frame"
    src="https://script.google.com/a/macros/usc.edu.ph/s/AKfycbwd_q-DM2Ft2T_TGiat4RGuodo8e9vib2-A70ijM2sc64tBpCwsTGjCRXouUsS1K2T0Zg/exec"
    title="USC Comptroller - Admin Ledger"
    allow="clipboard-write"
    onload="document.getElementById('loader').style.opacity='0'; setTimeout(function(){document.getElementById('loader').style.display='none';}, 300);">
  </iframe>

</body>
</html>
